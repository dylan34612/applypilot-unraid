<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApplyPilot</title>
<style>
  :root {
    --bg: #14161a; --panel: #1c1f26; --panel2: #23262e; --border: #2e323c;
    --text: #d7dae0; --dim: #8b909c; --accent: #4c9aff; --green: #3fb950;
    --amber: #d29922; --red: #f85149; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  header h1 { font-size: 20px; margin: 0; }
  .pill {
    padding: 3px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
    background: var(--panel2); border: 1px solid var(--border); color: var(--dim);
  }
  .pill.running { color: var(--amber); border-color: var(--amber); }
  .spacer { flex: 1; }
  a.btnlink, button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; text-decoration: none; display: inline-block;
  }
  button:hover, a.btnlink:hover { border-color: var(--accent); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0b1524; }
  button.danger  { color: var(--red); border-color: var(--red); }
  button.warn    { color: var(--amber); border-color: var(--amber); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px;
  }
  .stat .v { font-size: 22px; font-weight: 700; }
  .stat .k { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .04em; }
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 18px;
  }
  .panel h2 { margin: 0 0 12px; font-size: 15px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row label { font-size: 13px; color: var(--dim); }
  .row input[type=number] {
    width: 64px; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px;
  }
  .tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tabs button.active { border-color: var(--accent); color: var(--accent); }
  textarea {
    width: 100%; min-height: 320px; resize: vertical;
    background: #0f1115; color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; font: 12.5px/1.5 ui-monospace, Consolas, monospace;
  }
  .note { font-size: 12px; color: var(--dim); margin: 8px 0 0; }
  .note.warn { color: var(--amber); }
  #log {
    background: #0f1115; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; height: 340px; overflow-y: auto; white-space: pre-wrap;
    font: 12px/1.45 ui-monospace, Consolas, monospace; color: #b6bcc8; margin: 0;
  }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border); color: var(--dim); }
  .badge.ok { color: var(--green); border-color: var(--green); }
  .badge.missing { color: var(--amber); border-color: var(--amber); }
  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 18px; font-size: 13px; display: none; z-index: 10;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>🛩️ ApplyPilot</h1>
    <span id="statusPill" class="pill">idle</span>
    <span class="spacer"></span>
    <a class="btnlink" href="/dashboard" target="_blank">Results dashboard ↗</a>
  </header>

  <div class="grid" id="stats"></div>

  <div class="panel">
    <h2>Pipeline</h2>
    <div class="row" style="margin-bottom:10px">
      <button class="primary" id="btnRun">▶ Run pipeline (all stages)</button>
      <button id="btnDoctor">🩺 Doctor</button>
      <label>workers <input type="number" id="workers" value="1" min="1" max="8"></label>
      <label>min score <input type="number" id="minScore" value="7" min="1" max="10"></label>
      <span class="spacer"></span>
      <button class="danger" id="btnStop" disabled>■ Stop</button>
    </div>
    <div class="row">
      <button class="warn" id="btnDry">🧪 Auto-apply (dry-run)</button>
      <button class="danger" id="btnApply">🚀 Auto-apply (LIVE — submits real applications)</button>
    </div>
    <p class="note">Discovery scrapes job boards, then AI scores/tailors/writes cover letters
      using your configured endpoint. Auto-apply drives headless Chrome via Claude Code —
      always dry-run first to see how your model handles forms.</p>
  </div>

  <div class="panel">
    <h2>Setup <span id="setupBadges"></span></h2>
    <div class="tabs">
      <button data-tab="profile" class="active">profile.json</button>
      <button data-tab="searches">searches.yaml</button>
      <button data-tab="resume">resume.txt</button>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
    <p class="note" id="editorNote"></p>
    <div class="row" style="margin-top:10px">
      <button class="primary" id="btnSave">Save</button>
      <span class="spacer"></span>
      <label class="note">resume.pdf (optional):</label>
      <input type="file" id="pdfInput" accept=".pdf" style="font-size:12px">
      <button id="btnPdf">Upload PDF</button>
    </div>
  </div>

  <div class="panel">
    <h2>Console</h2>
    <pre id="log"></pre>
  </div>

</div>
<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let logSeq = 0, curTab = "profile", dirty = false, filesState = {};

function toast(msg, ms = 2600) {
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", ms);
}

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) {
    let d = ""; try { d = (await r.json()).detail || ""; } catch {}
    throw new Error(d || (r.status + " " + r.statusText));
  }
  return r.json();
}

// ---- state polling ----
async function pollState() {
  try {
    const s = await api("/api/state");
    filesState = s.files;
    const pill = $("statusPill");
    pill.textContent = s.running ? "running: " + s.task : "idle";
    pill.classList.toggle("running", s.running);
    $("btnStop").disabled = !s.running;
    for (const b of ["btnRun", "btnDry", "btnApply", "btnDoctor"])
      $(b).disabled = s.running;

    const st = $("stats"); st.innerHTML = "";
    const entries = Object.entries(s.stats || {}).filter(([k, v]) => typeof v === "number");
    for (const [k, v] of entries) {
      const d = document.createElement("div");
      d.className = "stat";
      d.innerHTML = `<div class="v">${v}</div><div class="k">${k.replace(/_/g, " ")}</div>`;
      st.appendChild(d);
    }

    const badges = [];
    badges.push(s.llm_configured
      ? `<span class="badge ok">LLM endpoint ✓</span>`
      : `<span class="badge missing">LLM endpoint not configured</span>`);
    for (const [name, ok] of Object.entries(s.files))
      badges.push(`<span class="badge ${ok ? "ok" : "missing"}">${name}${ok ? " ✓" : " ✗"}</span>`);
    $("setupBadges").innerHTML = badges.join(" ");
  } catch (e) { /* transient */ }
}

// ---- log polling ----
async function pollLogs() {
  try {
    const d = await api("/api/logs?since=" + logSeq);
    if (d.lines.length) {
      const log = $("log");
      const atBottom = log.scrollTop + log.clientHeight >= log.scrollHeight - 30;
      for (const l of d.lines) { log.textContent += l.line + "\n"; logSeq = l.seq; }
      if (atBottom) log.scrollTop = log.scrollHeight;
    }
  } catch (e) { /* transient */ }
}

// ---- tasks ----
async function startTask(body, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  try {
    const d = await api("/api/task", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        workers: +$("workers").value || 1,
        min_score: +$("minScore").value || 7,
        ...body,
      }),
    });
    toast("Started: " + d.started);
    pollState();
  } catch (e) { toast("Error: " + e.message, 5000); }
}

$("btnRun").onclick    = () => startTask({ action: "run" });
$("btnDoctor").onclick = () => startTask({ action: "doctor" });
$("btnDry").onclick    = () => startTask({ action: "apply", dry_run: true });
$("btnApply").onclick  = () => startTask({ action: "apply" },
  "LIVE auto-apply will SUBMIT REAL job applications under your name.\n\nContinue?");
$("btnStop").onclick   = async () => {
  try { await api("/api/stop", { method: "POST" }); toast("Stop signal sent"); }
  catch (e) { toast("Error: " + e.message, 5000); }
};

// ---- config editors ----
const NOTES = {
  profile: "Your contact info, work authorization, compensation, and resume facts. Powers scoring, tailoring, and form auto-fill.",
  searches: "Job queries, locations, boards, and title filters used by the discovery stage.",
  resume: "Plain-text master resume. Required for scoring and tailoring — paste the full text here.",
};

async function loadTab(name) {
  if (dirty && !confirm("Discard unsaved changes?")) return;
  curTab = name; dirty = false;
  document.querySelectorAll(".tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === name));
  try {
    const d = await api("/api/file/" + name);
    $("editor").value = d.content;
    $("editorNote").textContent =
      (d.exists ? "" : "Not saved yet — starting from the example template. ") + NOTES[name];
    $("editorNote").className = d.exists ? "note" : "note warn";
  } catch (e) { toast("Error: " + e.message, 5000); }
}

document.querySelectorAll(".tabs button").forEach(b =>
  b.onclick = () => loadTab(b.dataset.tab));
$("editor").oninput = () => dirty = true;

$("btnSave").onclick = async () => {
  try {
    await api("/api/file/" + curTab, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: $("editor").value }),
    });
    dirty = false;
    toast("Saved " + curTab);
    loadTab(curTab); pollState();
  } catch (e) { toast("Save failed: " + e.message, 6000); }
};

$("btnPdf").onclick = async () => {
  const f = $("pdfInput").files[0];
  if (!f) return toast("Choose a .pdf file first");
  const fd = new FormData(); fd.append("file", f);
  try {
    await api("/api/resume-pdf", { method: "POST", body: fd });
    toast("resume.pdf uploaded"); pollState();
  } catch (e) { toast("Upload failed: " + e.message, 6000); }
};

// ---- boot ----
loadTab("profile");
pollState(); pollLogs();
setInterval(pollState, 3000);
setInterval(pollLogs, 1500);
</script>
</body>
</html>
