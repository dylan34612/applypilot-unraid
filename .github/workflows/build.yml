name: Build and push image

on:
  push:
    branches: ["**"]
    paths:
      - Dockerfile
      - entrypoint.sh
      - "webui/**"
      - .github/workflows/build.yml
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up new ApplyPilot / Claude Code releases
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: branch name always (e.g. :upstream-prep for testing on the
      # server); :latest and :sha only from main
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/applypilot-unraid
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
