name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - .github/workflows/build.yml
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up new ApplyPilot / Claude Code releases
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/applypilot-unraid:latest
            ghcr.io/${{ github.repository_owner }}/applypilot-unraid:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
